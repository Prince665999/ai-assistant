name: CI/CD Pipeline

# When does this run?
on:
  push:
    branches: [main, develop]  # On push to main or develop
  pull_request:
    branches: [main]           # On pull requests targeting main

# What jobs to run?
jobs:
  # --- JOB 1: Test Backend ---
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -v
        env:
          # Test environment variables (not production!)
          SECRET_KEY: test-secret-key
          GROQ_API_KEY: test-key
          DATABASE_URL: sqlite:///./test.db

  # --- JOB 2: Lint Frontend ---
  lint-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint  # You'll need to add lint script to package.json

  # --- JOB 3: Deploy Backend (only on main, after tests pass) ---
  deploy-backend:
    needs: test-backend           # Wait for tests to pass
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

  # --- JOB 4: Deploy Frontend (only on main, after lint passes) ---
  deploy-frontend:
    needs: lint-frontend          # Wait for lint to pass
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"
          working-directory: frontend